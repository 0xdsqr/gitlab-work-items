version: 2
updates:
  - package-ecosystem: bun
    directory: /
    target-branch: master
    schedule:
      interval: weekly
    labels:
      - dependencies

  - package-ecosystem: nix
    directory: /
    target-branch: master
    schedule:
      interval: weekly
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    target-branch: master
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
