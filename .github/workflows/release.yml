name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Verify release version
        shell: bash
        run: |
          set -euo pipefail
          version="$(nix eval --raw .#gitlab-work-items.version)"
          if [[ "$GITHUB_REF_NAME" != "v${version}" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version v${version}" >&2
            exit 1
          fi

      - name: Run Nix quality gate
        run: nix flake check --print-build-logs

      - name: Build release package
        run: nix build --no-link --print-build-logs .#gitlab-work-items

  publish:
    name: Publish GitHub release
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --generate-notes
          --title "gitlab-work-items $GITHUB_REF_NAME" --verify-tag
